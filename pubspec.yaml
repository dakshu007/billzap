name: billzap
description: BillZap - Free GST Billing for Indian MSMEs. 100% Offline.
publish_to: 'none'
version: 1.0.0+50

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  gap: ^3.0.1
  cupertino_icons: ^1.0.8
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^9.0.0
  path_provider: ^2.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  uuid: ^4.3.3
  material_symbols_icons: ^4.2719.2
  qr_flutter: ^4.1.0
  speech_to_text: ^6.6.2
  barcode: ^2.2.4

flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1557FF"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: false
  min_sdk_android: 21
