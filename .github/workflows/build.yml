name: BillZap CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: BUILD DEBUG APK (every push) ──────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: billzap-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1

  # ── JOB 2: BUILD RELEASE + DEPLOY TO PLAY STORE (only on push to main) ──
  build-release:
    name: Build Release & Deploy
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Decode keystore from GitHub Secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/billzap.keystore

      # Create key.properties file
      - name: Create key.properties
        run: |
          cat > android/key.properties << KEYEOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=billzap.keystore
          KEYEOF

      # Build signed release APK (split per ABI = smaller files)
      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      # Build signed AAB (required for Play Store)
      - name: Build release AAB
        run: flutter build appbundle --release

      # Upload APKs as artifact (download anytime)
      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: billzap-release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 1

      # Upload AAB as artifact
      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: billzap-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 1

      # Deploy to Play Store Internal Testing
      - name: Deploy to Play Store (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON }}
          packageName: com.billzap.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew
