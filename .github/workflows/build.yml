name: BillZap CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: BUILD DEBUG APK ───────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Save debug APK to Mac
        run: |
          mkdir -p ~/BillZapBuilds/debug
          cp build/app/outputs/flutter-apk/app-debug.apk \
             ~/BillZapBuilds/debug/billzap-debug-$(date +%Y%m%d-%H%M%S).apk
          echo "✅ Debug APK saved to ~/BillZapBuilds/debug/"
          ls -lh ~/BillZapBuilds/debug/

  # ── JOB 2: BUILD RELEASE + DEPLOY TO PLAY STORE ─────────────────────────
  build-release:
    name: Build Release & Deploy to Play Store
    runs-on: self-hosted
    needs: build-debug
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/billzap.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties << KEYEOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=billzap.keystore
          KEYEOF

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Save release builds to Mac
        run: |
          mkdir -p ~/BillZapBuilds/release
          mkdir -p ~/BillZapBuilds/aab
          cp build/app/outputs/flutter-apk/app-*-release.apk ~/BillZapBuilds/release/
          cp build/app/outputs/bundle/release/app-release.aab \
             ~/BillZapBuilds/aab/billzap-$(date +%Y%m%d-%H%M%S).aab
          echo "✅ Builds saved to Mac"
          ls -lh ~/BillZapBuilds/release/
          ls -lh ~/BillZapBuilds/aab/

      - name: Deploy AAB to Play Store Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON }}
          packageName: com.billzap.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Open builds folder
        run: open ~/BillZapBuilds
